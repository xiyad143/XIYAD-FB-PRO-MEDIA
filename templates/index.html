<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>XIYAD FB Media Pro</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://widget.cloudinary.com/v2.0/global/all.js" type="text/javascript"></script>
  <style>
    :root {
      --bg-primary: #f0f2f5;
      --bg-card: #ffffff;
      --text-primary: #1c1e21;
      --text-secondary: #65676b;
      --border-color: #e0e0e0;
      --primary: #1877f2;
      --primary-hover: #166fe5;
      --glass-bg: rgba(255, 255, 255, 0.75);
      --glass-border: rgba(255, 255, 255, 0.3);
      --sidebar-bg: #ffffff;
      --sidebar-hover: #f0f2f5;
      --sidebar-active: #e7f3ff;
      --shadow-sm: 0 1px 2px rgba(0,0,0,0.08);
      --shadow-md: 0 4px 12px rgba(0,0,0,0.08);
      --radius: 12px;
      --transition-speed: 0.2s;
    }

    .dark {
      --bg-primary: #18191a;
      --bg-card: #242526;
      --text-primary: #e4e6eb;
      --text-secondary: #b0b3b8;
      --border-color: #3e4042;
      --glass-bg: rgba(36,37,38,0.85);
      --glass-border: rgba(255,255,255,0.1);
      --sidebar-bg: #242526;
      --sidebar-hover: #3a3b3c;
      --sidebar-active: #263850;
      --shadow-sm: 0 1px 2px rgba(0,0,0,0.3);
      --shadow-md: 0 4px 12px rgba(0,0,0,0.4);
    }

    .amoled {
      --bg-primary: #000000;
      --bg-card: #121212;
      --text-primary: #ffffff;
      --text-secondary: #888888;
      --border-color: #333333;
      --glass-bg: rgba(18,18,18,0.95);
      --glass-border: rgba(255,255,255,0.05);
      --sidebar-bg: #000000;
      --sidebar-hover: #1a1a1a;
      --sidebar-active: #1a237e;
    }

    body {
      background: var(--bg-primary);
      color: var(--text-primary);
      font-family: 'Inter', system-ui, sans-serif;
      transition: background var(--transition-speed), color var(--transition-speed);
    }

    .sidebar {
      background: var(--sidebar-bg);
      border-right: 1px solid var(--border-color);
      transition: all var(--transition-speed);
    }

    .sidebar-link {
      color: var(--text-secondary);
      transition: all 0.15s;
    }

    .sidebar-link:hover {
      background: var(--sidebar-hover);
      color: var(--text-primary);
    }

    .sidebar-link.active {
      background: var(--sidebar-active);
      color: var(--primary);
      font-weight: 600;
    }

    .card {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: var(--radius);
      box-shadow: var(--shadow-sm);
      transition: box-shadow var(--transition-speed);
    }

    .card:hover {
      box-shadow: var(--shadow-md);
    }

    .glass-card {
      background: var(--glass-bg);
      backdrop-filter: blur(12px);
      border: 1px solid var(--glass-border);
    }

    .btn-primary {
      background: var(--primary);
      color: white;
      border-radius: 8px;
      padding: 0.5rem 1rem;
      font-weight: 500;
      transition: background var(--transition-speed);
    }

    .btn-primary:hover {
      background: var(--primary-hover);
    }

    .upload-progress {
      height: 6px;
      background: var(--border-color);
      border-radius: 3px;
    }

    .upload-progress-bar {
      height: 100%;
      background: var(--primary);
      border-radius: 3px;
      transition: width 0.3s;
    }

    .workflow-time-slot {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 0.5rem;
    }

    @media (max-width: 768px) {
      .sidebar {
        position: fixed;
        left: -100%;
        z-index: 1000;
        width: 280px;
        height: 100vh;
      }
      .sidebar.open {
        left: 0;
      }
      .overlay {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(0,0,0,0.5);
        z-index: 999;
      }
      .overlay.open {
        display: block;
      }
    }
  </style>
</head>
<body class="bg-[var(--bg-primary)]" id="main-body">

  <!-- Overlay for mobile -->
  <div id="overlay" class="overlay" onclick="closeSidebar()"></div>

  <!-- Main layout -->
  <div class="flex h-screen">
    <!-- Sidebar -->
    <aside class="sidebar w-64 flex-shrink-0 flex flex-col p-4" id="sidebar">
      <div class="flex items-center justify-between mb-8">
        <h1 class="text-xl font-bold text-blue-600">XIYAD Media Pro</h1>
        <button class="lg:hidden text-gray-600" onclick="closeSidebar()">
          <i class="fas fa-times"></i>
        </button>
      </div>
      <nav class="flex-1 space-y-1">
        <a href="#" data-section="dashboard" class="sidebar-link flex items-center gap-3 px-3 py-2 rounded-lg">
          <i class="fas fa-tachometer-alt w-5"></i><span>Dashboard</span>
        </a>
        <a href="#" data-section="pages" class="sidebar-link flex items-center gap-3 px-3 py-2 rounded-lg">
          <i class="fas fa-flag w-5"></i><span>Pages</span>
        </a>
        <a href="#" data-section="media" class="sidebar-link flex items-center gap-3 px-3 py-2 rounded-lg">
          <i class="fas fa-photo-video w-5"></i><span>Media Library</span>
        </a>
        <a href="#" data-section="automation" class="sidebar-link flex items-center gap-3 px-3 py-2 rounded-lg">
          <i class="fas fa-robot w-5"></i><span>Automation</span>
        </a>
        <a href="#" data-section="live" class="sidebar-link flex items-center gap-3 px-3 py-2 rounded-lg">
          <i class="fas fa-broadcast-tower w-5"></i><span>Live Streaming</span>
        </a>
        <a href="#" data-section="analytics" class="sidebar-link flex items-center gap-3 px-3 py-2 rounded-lg">
          <i class="fas fa-chart-line w-5"></i><span>Analytics</span>
        </a>
        <a href="#" data-section="settings" class="sidebar-link flex items-center gap-3 px-3 py-2 rounded-lg">
          <i class="fas fa-cog w-5"></i><span>Settings</span>
        </a>
        <a href="#" data-section="profile" class="sidebar-link flex items-center gap-3 px-3 py-2 rounded-lg">
          <i class="fas fa-user-circle w-5"></i><span>Profile</span>
        </a>
      </nav>
      <div class="border-t pt-3 text-xs text-[var(--text-secondary)]">
        <div id="user-info-sidebar" class="flex items-center gap-2 mb-2">
          <img id="sidebar-avatar" src="" class="w-6 h-6 rounded-full hidden">
          <span id="sidebar-username" class="truncate"></span>
        </div>
        <button onclick="logout()" class="text-red-500 hover:text-red-700">Logout</button>
      </div>
    </aside>

    <!-- Mobile menu button -->
    <button class="lg:hidden fixed top-4 left-4 z-50 bg-white p-2 rounded-md shadow" onclick="openSidebar()">
      <i class="fas fa-bars"></i>
    </button>

    <!-- Main Content -->
    <main class="flex-1 overflow-y-auto p-4 md:p-6" id="main-content">
      <!-- All sections go here, loaded dynamically -->
    </main>
  </div>

  <script>
    // ---------- GLOBAL STATE ----------
    const API_BASE = window.location.origin;
    let currentUser = null;
    let pages = [];
    let mediaFiles = [];
    let scheduledPosts = [];
    let workflows = [];
    let analyticsCharts = {};
    let currentTheme = localStorage.getItem('xmedia_theme') || 'light';
    applyTheme(currentTheme);

    // ---------- THEME ENGINE ----------
    function setTheme(theme) {
      document.body.classList.remove('dark', 'amoled');
      if (theme === 'dark') document.body.classList.add('dark');
      else if (theme === 'amoled') document.body.classList.add('amoled');
      localStorage.setItem('xmedia_theme', theme);
      currentTheme = theme;
    }

    function applyTheme(theme) {
      setTheme(theme);
    }

    // ---------- HELPERS ----------
    async function apiCall(url, options = {}) {
      const res = await fetch(API_BASE + url, options);
      return res.json();
    }

    function showToast(msg, type = 'info') {
      const colors = { success: '#10b981', error: '#ef4444', info: '#3b82f6' };
      const toast = document.createElement('div');
      toast.className = 'fixed bottom-4 right-4 px-4 py-2 rounded-lg text-white shadow-lg z-50 transition';
      toast.style.background = colors[type] || colors.info;
      toast.textContent = msg;
      document.body.appendChild(toast);
      setTimeout(() => toast.remove(), 3000);
    }

    // ---------- NAVIGATION ----------
    function navigate(section) {
      document.querySelectorAll('.sidebar-link').forEach(l => l.classList.remove('active'));
      const activeLink = document.querySelector(`[data-section="${section}"]`);
      if (activeLink) activeLink.classList.add('active');
      loadSection(section);
      closeSidebar();
    }

    function openSidebar() {
      document.getElementById('sidebar').classList.add('open');
      document.getElementById('overlay').classList.add('open');
    }

    function closeSidebar() {
      document.getElementById('sidebar').classList.remove('open');
      document.getElementById('overlay').classList.remove('open');
    }

    // Attach click handlers to sidebar links
    document.querySelectorAll('.sidebar-link').forEach(link => {
      link.addEventListener('click', (e) => {
        e.preventDefault();
        navigate(link.dataset.section);
      });
    });

    // ---------- SECTION LOADER ----------
    function loadSection(name) {
      const main = document.getElementById('main-content');
      if (!main) return;
      switch (name) {
        case 'dashboard': renderDashboard(); break;
        case 'pages': renderPages(); break;
        case 'media': renderMedia(); break;
        case 'automation': renderAutomation(); break;
        case 'live': renderLive(); break;
        case 'analytics': renderAnalytics(); break;
        case 'settings': renderSettings(); break;
        case 'profile': renderProfile(); break;
      }
    }

    // ---------- DATA LOADING ----------
    async function loadInitialData() {
      const profile = await apiCall('/api/user-profile').catch(() => ({ error: true }));
      if (!profile.error) {
        currentUser = profile;
        document.getElementById('sidebar-username').textContent = profile.name || 'User';
        if (profile.picture?.data?.url) {
          document.getElementById('sidebar-avatar').src = profile.picture.data.url;
          document.getElementById('sidebar-avatar').classList.remove('hidden');
        }
      }
      await refreshPages();
      await refreshMedia();
      await refreshWorkflows();
      await refreshScheduled();
    }

    async function refreshPages() {
      pages = await apiCall('/api/pages');
    }

    async function refreshMedia() {
      mediaFiles = await apiCall('/api/media');
    }

    async function refreshWorkflows() {
      workflows = await apiCall('/api/workflows');
    }

    async function refreshScheduled() {
      scheduledPosts = await apiCall('/api/scheduled-posts');
    }

    // ---------- DASHBOARD ----------
    function renderDashboard() {
      const main = document.getElementById('main-content');
      const activeWorkflows = workflows.filter(w => w.enabled).length;
      const totalVideos = mediaFiles.length;
      const followerGrowth = pages.reduce((sum, p) => sum + (p.fan_count || 0), 0);

      main.innerHTML = `
        <div class="mb-6"><h2 class="text-2xl font-bold">Dashboard</h2></div>
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 mb-6">
          <div class="card p-4"><h3 class="text-sm text-gray-500">Connected Pages</h3><p class="text-2xl font-bold">${pages.length}</p></div>
          <div class="card p-4"><h3 class="text-sm text-gray-500">Active Workflows</h3><p class="text-2xl font-bold">${activeWorkflows}</p></div>
          <div class="card p-4"><h3 class="text-sm text-gray-500">Uploaded Videos</h3><p class="text-2xl font-bold">${totalVideos}</p></div>
          <div class="card p-4"><h3 class="text-sm text-gray-500">Follower Growth</h3><p class="text-2xl font-bold">${followerGrowth.toLocaleString()}</p></div>
        </div>
        <div class="card p-4 mb-6">
          <h3 class="font-semibold mb-3">Follower Growth (30 days)</h3>
          <canvas id="dashboard-chart" height="80"></canvas>
        </div>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <div class="card p-4">
            <h3 class="font-semibold mb-2">Your Pages</h3>
            <div id="dash-pages"></div>
          </div>
          <div class="card p-4">
            <h3 class="font-semibold mb-2">Upcoming Posts</h3>
            <div id="dash-upcoming"></div>
          </div>
        </div>
      `;
      renderDashboardPages();
      renderDashboardUpcoming();
      loadDashboardChart();
    }

    function renderDashboardPages() {
      const container = document.getElementById('dash-pages');
      if (!container) return;
      container.innerHTML = pages.slice(0, 3).map(p => `
        <div class="flex items-center gap-2 py-2">
          <img src="${p.picture_url || 'https://via.placeholder.com/30'}" class="w-8 h-8 rounded-full">
          <span>${p.name}</span>
        </div>
      `).join('') || '<p class="text-sm text-gray-500">No pages connected</p>';
    }

    function renderDashboardUpcoming() {
      const container = document.getElementById('dash-upcoming');
      const upcoming = scheduledPosts.filter(p => p.status === 'pending').slice(0, 5);
      container.innerHTML = upcoming.map(p => `
        <div class="flex justify-between text-sm py-1">
          <span>${p.media_filename || 'Video'}</span>
          <span>${new Date(p.scheduled_time).toLocaleString()}</span>
          <span class="text-yellow-600">Pending</span>
        </div>
      `).join('') || '<p class="text-sm text-gray-500">No upcoming posts</p>';
    }

    async function loadDashboardChart() {
      const ctx = document.getElementById('dashboard-chart')?.getContext('2d');
      if (!ctx) return;
      // Fetch aggregate follower data from first page or general – for demo we show dummy
      new Chart(ctx, {
        type: 'line',
        data: {
          labels: Array.from({length:30}, (_,i) => `Day ${i+1}`),
          datasets: [{
            label: 'Total Followers',
            data: Array.from({length:30}, () => Math.floor(Math.random()*100)),
            borderColor: '#1877f2',
            backgroundColor: 'rgba(24,119,242,0.1)',
            fill: true
          }]
        },
        options: { responsive: true }
      });
    }

    // ---------- PAGES ----------
    function renderPages() {
      const main = document.getElementById('main-content');
      main.innerHTML = `
        <div class="flex justify-between items-center mb-6">
          <h2 class="text-2xl font-bold">📄 Your Pages</h2>
          <button onclick="refreshPagesUI()" class="btn-primary">Refresh Pages</button>
        </div>
        <div id="pages-list" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
      `;
      refreshPagesUI();
    }

    async function refreshPagesUI() {
      await refreshPages();
      const container = document.getElementById('pages-list');
      if (!container) return;
      container.innerHTML = pages.map(p => `
        <div class="card p-4 flex items-center gap-3">
          <img src="${p.picture_url || 'https://via.placeholder.com/50'}" class="w-12 h-12 rounded-full">
          <div class="flex-1">
            <h3 class="font-semibold">${p.name}</h3>
            <p class="text-sm">Followers: ${p.fan_count || 0}</p>
            <p class="text-xs text-gray-500">ID: ${p.id}</p>
            <div class="mt-1 text-xs text-blue-500 cursor-pointer" onclick="alert('Token: ${p.access_token}')">Show Token</div>
          </div>
          <span class="text-xs ${p.connected ? 'text-green-600' : 'text-red-600'}">${p.connected ? 'Connected' : 'Disconnected'}</span>
        </div>
      `).join('');
    }

    // ---------- MEDIA LIBRARY ----------
    function renderMedia() {
      const main = document.getElementById('main-content');
      main.innerHTML = `
        <h2 class="text-2xl font-bold mb-4">🎬 Media Library</h2>
        <div class="flex gap-2 mb-4">
          <button id="upload-widget-btn" class="btn-primary">Upload Video</button>
          <input type="text" id="media-search" placeholder="Search..." class="border rounded px-3 py-1 flex-1">
        </div>
        <div class="card p-4 mb-4">
          <div id="upload-progress-container" class="hidden mb-2">
            <div class="upload-progress"><div id="upload-progress-bar" class="upload-progress-bar" style="width:0%"></div></div>
            <p id="upload-status-text" class="text-sm text-gray-500 mt-1"></p>
          </div>
          <div id="media-grid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-4"></div>
        </div>
      `;
      loadMediaGrid();
      setupCloudinaryUpload();
      document.getElementById('media-search').addEventListener('input', (e) => filterMedia(e.target.value));
    }

    function loadMediaGrid(filter = '') {
      const grid = document.getElementById('media-grid');
      if (!grid) return;
      let filtered = mediaFiles;
      if (filter) {
        filtered = mediaFiles.filter(m => m.original_name.toLowerCase().includes(filter.toLowerCase()));
      }
      grid.innerHTML = filtered.map(m => `
        <div class="card overflow-hidden">
          <video src="${m.url}" class="w-full h-32 object-cover"></video>
          <div class="p-2">
            <p class="text-sm truncate">${m.original_name}</p>
            <p class="text-xs text-gray-500">${(m.file_size/1024).toFixed(1)} KB · ${m.duration ? m.duration.toFixed(1)+'s' : ''}</p>
            <div class="flex justify-between mt-1">
              <button onclick="deleteMediaFile(${m.id})" class="text-red-500"><i class="fas fa-trash"></i></button>
              <button onclick="assignMediaFolder(${m.id})" class="text-blue-500"><i class="fas fa-folder"></i></button>
            </div>
          </div>
        </div>
      `).join('') || '<p class="col-span-full text-gray-500 text-center">No media files</p>';
    }

    function filterMedia(query) {
      loadMediaGrid(query);
    }

    async function deleteMediaFile(id) {
      if (confirm('Delete this video?')) {
        await apiCall(`/api/media/${id}`, { method: 'DELETE' });
        await refreshMedia();
        loadMediaGrid(document.getElementById('media-search')?.value || '');
        showToast('Video deleted', 'success');
      }
    }

    async function assignMediaFolder(id) {
      const folder = prompt('Enter folder name (or page ID):');
      if (folder) {
        await apiCall(`/api/media/${id}/assign`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ folder })
        });
        await refreshMedia();
        loadMediaGrid(document.getElementById('media-search')?.value || '');
      }
    }

    function setupCloudinaryUpload() {
      document.getElementById('upload-widget-btn').addEventListener('click', async () => {
        const sig = await apiCall('/api/cloudinary-signature', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({}) });
        if (sig.error) return showToast('Could not get upload signature', 'error');
        cloudinary.openUploadWidget({
          cloudName: sig.cloud_name,
          apiKey: sig.api_key,
          uploadSignature: sig.signature,
          uploadSignatureTimestamp: sig.timestamp,
          folder: 'xmedia',
          resourceType: 'video',
          maxFileSize: 2000000000,
          multiple: true,
          styles: { palette: { window: "#FFFFFF", windowBorder: "#90A0B3", tabIcon: "#0078FF", menuIcons: "#5A616A", textDark: "#000000", textLight: "#FFFFFF", link: "#0078FF", action: "#FF620C", inactiveTabIcon: "#0E2F5A", error: "#F44235", breakColor: "#E0E0E0" } }
        }, async (error, result) => {
          if (!error && result && result.event === 'success') {
            const info = result.info;
            await apiCall('/api/media/save', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({
                public_id: info.public_id,
                secure_url: info.secure_url,
                original_name: info.original_filename,
                bytes: info.bytes,
                duration: info.duration,
                thumbnail_url: info.thumbnail_url
              })
            });
            await refreshMedia();
            loadMediaGrid(document.getElementById('media-search')?.value || '');
            showToast('Upload complete!', 'success');
          }
          if (error) showToast('Upload error: ' + error.message, 'error');
        });
      });
    }

    // ---------- AUTOMATION ----------
    function renderAutomation() {
      const main = document.getElementById('main-content');
      main.innerHTML = `
        <h2 class="text-2xl font-bold mb-4">🤖 Automation Workflows</h2>
        <div class="flex justify-between mb-4">
          <button onclick="createWorkflow()" class="btn-primary">+ New Workflow</button>
        </div>
        <div id="workflows-list" class="space-y-4"></div>
        <div id="workflow-form" class="card p-4 hidden mt-4"></div>
      `;
      loadWorkflows();
    }

    async function loadWorkflows() {
      await refreshWorkflows();
      const list = document.getElementById('workflows-list');
      list.innerHTML = workflows.map(w => `
        <div class="card p-4">
          <div class="flex justify-between items-center">
            <div>
              <h3 class="font-semibold">${w.name} (${w.page_id})</h3>
              <p class="text-sm">Times: ${w.posting_times.join(', ')}</p>
              <p class="text-xs">Days: ${w.days_of_week} | Mode: ${w.auto_select_mode}</p>
            </div>
            <div class="flex gap-2">
              <button onclick="editWorkflow(${w.id})" class="text-blue-500"><i class="fas fa-edit"></i></button>
              <button onclick="toggleWorkflow(${w.id}, ${!w.enabled})" class="text-yellow-500"><i class="fas fa-power-off"></i></button>
              <button onclick="deleteWorkflow(${w.id})" class="text-red-500"><i class="fas fa-trash"></i></button>
            </div>
          </div>
        </div>
      `).join('');
    }

    function createWorkflow() {
      const form = document.getElementById('workflow-form');
      form.innerHTML = `
        <h3 class="font-bold mb-3">New Workflow</h3>
        <select id="wf-page" class="border rounded p-2 mb-2 w-full">${pages.map(p => `<option value="${p.id}">${p.name}</option>`).join('')}</select>
        <input type="text" id="wf-name" placeholder="Workflow name" class="border rounded p-2 mb-2 w-full" value="Default">
        <div class="mb-2">
          <label class="block text-sm">Days of week (comma separated 0-6)</label>
          <input type="text" id="wf-days" class="border rounded p-2 w-full" value="0,1,2,3,4,5,6">
        </div>
        <div id="time-slots-container" class="mb-2">
          <label class="block text-sm">Posting Times</label>
          <div class="workflow-time-slot"><input type="time" class="border rounded p-1" value="08:00"><button class="text-red-500" onclick="this.parentElement.remove()">✕</button></div>
          <div class="workflow-time-slot"><input type="time" class="border rounded p-1" value="12:00"><button class="text-red-500" onclick="this.parentElement.remove()">✕</button></div>
          <button onclick="addTimeSlot()" class="text-blue-500 text-sm">+ Add time</button>
        </div>
        <div class="mb-2"><label>Caption Template</label><input type="text" id="wf-caption" class="border rounded p-2 w-full" value="{caption}"></div>
        <div class="mb-2"><label>Hashtag Template</label><input type="text" id="wf-hashtags" class="border rounded p-2 w-full"></div>
        <div class="mb-2"><label>Auto Select Mode</label>
          <select id="wf-select-mode" class="border rounded p-2 w-full">
            <option value="sequential">Sequential</option>
            <option value="random">Random</option>
          </select>
        </div>
        <div class="mb-2"><label><input type="checkbox" id="wf-repeat" checked> Repeat</label></div>
        <div class="flex gap-2">
          <button onclick="saveWorkflow()" class="btn-primary">Save</button>
          <button onclick="document.getElementById('workflow-form').classList.add('hidden')" class="border rounded px-3 py-1">Cancel</button>
        </div>
      `;
      form.classList.remove('hidden');
      window._editWorkflowId = null;
    }

    function addTimeSlot() {
      const container = document.getElementById('time-slots-container');
      const div = document.createElement('div');
      div.className = 'workflow-time-slot';
      div.innerHTML = `<input type="time" class="border rounded p-1" value="12:00"><button class="text-red-500" onclick="this.parentElement.remove()">✕</button>`;
      container.insertBefore(div, container.lastElementChild);
    }

    async function saveWorkflow() {
      const data = {
        page_id: document.getElementById('wf-page').value,
        name: document.getElementById('wf-name').value,
        days_of_week: document.getElementById('wf-days').value,
        posting_times: Array.from(document.querySelectorAll('.workflow-time-slot input')).map(i => i.value),
        caption_template: document.getElementById('wf-caption').value,
        hashtag_template: document.getElementById('wf-hashtags').value,
        auto_select_mode: document.getElementById('wf-select-mode').value,
        repeat: document.getElementById('wf-repeat').checked
      };
      const endpoint = window._editWorkflowId ? `/api/workflows/${window._editWorkflowId}` : '/api/workflows';
      const method = window._editWorkflowId ? 'PUT' : 'POST';
      await apiCall(endpoint, { method, headers: {'Content-Type': 'application/json'}, body: JSON.stringify(data) });
      document.getElementById('workflow-form').classList.add('hidden');
      await loadWorkflows();
      showToast('Workflow saved', 'success');
    }

    async function editWorkflow(id) { /* populate form similar to create, set _editWorkflowId */ }
    async function deleteWorkflow(id) {
      if (confirm('Delete workflow?')) {
        await apiCall(`/api/workflows/${id}`, { method: 'DELETE' });
        await loadWorkflows();
      }
    }
    async function toggleWorkflow(id, enabled) {
      await apiCall(`/api/workflows/${id}`, { method: 'PUT', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({enabled}) });
      await loadWorkflows();
    }

    // ---------- LIVE ----------
    function renderLive() {
      const main = document.getElementById('main-content');
      main.innerHTML = `
        <h2 class="text-2xl font-bold mb-4">🔴 Live Streaming</h2>
        <div class="card p-4 max-w-lg">
          <select id="live-page" class="border rounded p-2 mb-2 w-full">${pages.map(p => `<option value="${p.id}">${p.name}</option>`).join('')}</select>
          <input type="text" id="live-title" placeholder="Stream Title" class="border rounded p-2 mb-2 w-full">
          <textarea id="live-desc" placeholder="Description" class="border rounded p-2 mb-2 w-full"></textarea>
          <div class="mb-2"><label><input type="checkbox" id="live-nonstop"> Nonstop (8hrs)</label></div>
          <button onclick="startLive()" class="btn-primary">Go Live</button>
          <div id="live-result" class="mt-2 text-sm"></div>
        </div>
      `;
    }

    async function startLive() {
      const page = document.getElementById('live-page').value;
      const title = document.getElementById('live-title').value;
      const desc = document.getElementById('live-desc').value;
      const res = await apiCall('/api/live/create', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({page_id: page, title, description: desc}) });
      if (res.error) showToast(res.error, 'error');
      else {
        document.getElementById('live-result').innerHTML = `<p class="text-green-600">Live created! Stream URL: ${res.stream_url || 'check your Facebook page'}</p>`;
      }
    }

    // ---------- ANALYTICS ----------
    function renderAnalytics() {
      const main = document.getElementById('main-content');
      main.innerHTML = `
        <h2 class="text-2xl font-bold mb-4">📊 Analytics</h2>
        <div class="flex gap-2 mb-4">
          <select id="analytics-page" class="border rounded p-2">${pages.map(p => `<option value="${p.id}">${p.name}</option>`).join('')}</select>
          <select id="analytics-period" class="border rounded p-2">
            <option value="7">7 Days</option>
            <option value="15">15 Days</option>
            <option value="30">30 Days</option>
          </select>
          <button onclick="loadAnalyticsData()" class="btn-primary">Load</button>
        </div>
        <div class="grid md:grid-cols-2 gap-4">
          <div class="card p-4"><canvas id="chart-followers"></canvas></div>
          <div class="card p-4"><canvas id="chart-reach"></canvas></div>
          <div class="card p-4 md:col-span-2"><canvas id="chart-engagement"></canvas></div>
        </div>
      `;
    }

    async function loadAnalyticsData() {
      const pageId = document.getElementById('analytics-page').value;
      const period = document.getElementById('analytics-period').value;
      const res = await apiCall(`/api/analytics/${pageId}?period=${period}`);
      if (res.error) return showToast(res.error, 'error');
      // Destroy old charts
      ['followers','reach','engagement'].forEach(id => {
        if (analyticsCharts[id]) analyticsCharts[id].destroy();
      });
      const followersData = res.page_fans || [];
      const reachData = res.page_impressions || [];
      const engagementData = res.page_engaged_users || [];
      const dates = followersData.map(d => d.date.split('T')[0]);
      analyticsCharts.followers = new Chart(document.getElementById('chart-followers'), {
        type: 'line', data: { labels: dates, datasets: [{ label: 'Followers', data: followersData.map(d=>d.value), borderColor: '#1877f2' }] }
      });
      analyticsCharts.reach = new Chart(document.getElementById('chart-reach'), {
        type: 'line', data: { labels: dates, datasets: [{ label: 'Reach', data: reachData.map(d=>d.value), borderColor: '#10b981' }] }
      });
      analyticsCharts.engagement = new Chart(document.getElementById('chart-engagement'), {
        type: 'bar', data: { labels: dates, datasets: [{ label: 'Engagement', data: engagementData.map(d=>d.value), backgroundColor: '#f59e0b' }] }
      });
    }

    // ---------- SETTINGS ----------
    function renderSettings() {
      const main = document.getElementById('main-content');
      main.innerHTML = `
        <h2 class="text-2xl font-bold mb-4">⚙️ Settings</h2>
        <div class="grid md:grid-cols-2 gap-4">
          <div class="card p-4">
            <h3 class="font-semibold mb-2">Facebook App</h3>
            <input type="text" id="fb-app-id" placeholder="App ID" class="border rounded p-2 w-full mb-2">
            <input type="password" id="fb-app-secret" placeholder="App Secret" class="border rounded p-2 w-full mb-2">
            <div class="flex gap-2">
              <button onclick="saveFBCreds()" class="btn-primary flex-1">Save</button>
              <button onclick="connectFB()" class="border rounded px-3 py-1 flex-1">Connect</button>
            </div>
          </div>
          <div class="card p-4">
            <h3 class="font-semibold mb-2">AI & Notifications</h3>
            <input type="password" id="groq-key" placeholder="Groq API Key" class="border rounded p-2 w-full mb-2">
            <input type="text" id="telegram-bot" placeholder="Telegram Bot Token" class="border rounded p-2 w-full mb-2">
            <input type="text" id="telegram-chat" placeholder="Telegram Chat ID" class="border rounded p-2 w-full mb-2">
            <button onclick="saveAISettings()" class="btn-primary w-full">Save</button>
          </div>
          <div class="card p-4">
            <h3 class="font-semibold mb-2">Theme</h3>
            <select id="theme-select" class="border rounded p-2 w-full mb-2" onchange="setTheme(this.value)">
              <option value="light">Light</option>
              <option value="dark">Dark</option>
              <option value="amoled">AMOLED</option>
            </select>
            <p class="text-sm">Current: ${currentTheme}</p>
          </div>
        </div>
      `;
      loadSettingsValues();
    }

    async function loadSettingsValues() {
      const res = await apiCall('/api/settings');
      if (res.fb_app_id) document.getElementById('fb-app-id').value = res.fb_app_id;
      if (res.fb_app_secret) document.getElementById('fb-app-secret').value = res.fb_app_secret;
      if (res.groq_api_key) document.getElementById('groq-key').value = res.groq_api_key;
      if (res.telegram_bot_token) document.getElementById('telegram-bot').value = res.telegram_bot_token;
      if (res.telegram_chat_id) document.getElementById('telegram-chat').value = res.telegram_chat_id;
      document.getElementById('theme-select').value = currentTheme;
    }

    async function saveFBCreds() {
      await apiCall('/api/settings', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({
        fb_app_id: document.getElementById('fb-app-id').value,
        fb_app_secret: document.getElementById('fb-app-secret').value
      })});
      showToast('Saved', 'success');
    }

    async function saveAISettings() {
      await apiCall('/api/settings', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({
        groq_api_key: document.getElementById('groq-key').value,
        telegram_bot_token: document.getElementById('telegram-bot').value,
        telegram_chat_id: document.getElementById('telegram-chat').value
      })});
      showToast('Saved', 'success');
    }

    async function connectFB() {
      const appId = document.getElementById('fb-app-id').value;
      if (!appId) return showToast('Enter App ID', 'error');
      const redirectUri = encodeURIComponent(window.location.origin);
      const scope = 'pages_manage_posts,pages_read_engagement,pages_read_user_content,publish_video';
      const authUrl = `https://www.facebook.com/v25.0/dialog/oauth?client_id=${appId}&redirect_uri=${redirectUri}&scope=${scope}&response_type=token`;
      window.open(authUrl, 'fbAuth', 'width=700,height=500');
      window.addEventListener('message', async (e) => {
        if (e.data && e.data.accessToken) {
          const res = await apiCall('/api/connect-facebook', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({short_lived_token: e.data.accessToken}) });
          if (res.success) showToast('Facebook connected!', 'success');
          else showToast(res.error, 'error');
        }
      });
    }

    // Handle OAuth redirect (if window.opener)
    if (window.location.hash) {
      const hash = window.location.hash.substring(1);
      const params = new URLSearchParams(hash);
      const accessToken = params.get('access_token');
      if (accessToken && window.opener) {
        window.opener.postMessage({ accessToken }, '*');
        window.close();
      }
    }

    // ---------- PROFILE ----------
    function renderProfile() {
      const main = document.getElementById('main-content');
      main.innerHTML = `
        <h2 class="text-2xl font-bold mb-4">👤 Profile</h2>
        <div class="card p-4 flex items-center gap-4 max-w-md">
          <img id="profile-pic" src="${currentUser?.picture?.data?.url || ''}" class="w-16 h-16 rounded-full">
          <div>
            <h3 class="font-semibold text-lg">${currentUser?.name || 'Unknown'}</h3>
            <p class="text-sm text-gray-500">Facebook User</p>
            <button onclick="logout()" class="text-red-500 text-sm mt-1">Logout</button>
            <button onclick="resetAll()" class="text-yellow-600 text-sm ml-2">Reset Settings</button>
          </div>
        </div>
      `;
    }

    function logout() {
      if (confirm('Disconnect Facebook?')) {
        apiCall('/api/disconnect-facebook', { method:'POST' }).finally(() => {
          localStorage.clear();
          window.location.reload();
        });
      }
    }

    function resetAll() {
      if (confirm('Reset all settings and disconnect?')) {
        apiCall('/api/disconnect-facebook', { method:'POST' });
        apiCall('/api/settings', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({
          fb_app_id: '', fb_app_secret: '', groq_api_key: '', telegram_bot_token: '', telegram_chat_id: ''
        })});
        localStorage.clear();
        window.location.reload();
      }
    }

    // ---------- INITIALISATION ----------
    loadInitialData();
    navigate('dashboard'); // default section
  </script>
</body>
</html>
